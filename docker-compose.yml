services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev

  build:
    build:
      context: .
      target: base
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm run build"

  install:
    build:
      context: .
      target: base
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm install

volumes:
  node_modules:
